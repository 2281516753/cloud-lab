version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: lb-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
    depends_on:
      - web1
      - web2
      - web3

  web1:
    image: nginx:alpine
    container_name: web1
    volumes:
      - ./html1:/usr/share/nginx/html:ro
    networks:
      - backend

  web2:
    image: nginx:alpine
    container_name: web2
    volumes:
      - ./html2:/usr/share/nginx/html:ro
    networks:
      - backend

  web3:
    image: nginx:alpine
    container_name: web3
    volumes:
      - ./html3:/usr/share/nginx/html:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge
